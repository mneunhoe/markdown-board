# LMU Munich brand theme for markdown-board.
#
# Palette from the LMU corporate design (Ludwig-Maximilians-Universität
# München brand guide): LMU Grün is the single brand accent; black and the
# four-step grey scale carry text and surfaces for a clean, institutional
# look. Typeface is Roboto (open-source, Apache 2.0 — bundled as a variable
# woff2 under theme/fonts/). Logo is the official flat-green LMU mark.
name: LMU München

# Header title beside the logo. Set to "" to hide it (the logo already
# carries the LMU wordmark); omit the key to keep the default "markdown-board".
title: LMU München

colors:
  accent: '#00883a' # LMU Grün
  accentHover: '#006e2f'
  background: '#f5f5f5' # Lichtgrau (page)
  surface: '#ececed' # between Lichtgrau and Hellgrau (columns)
  card: '#ffffff' # Weiß
  text: '#232323' # Schwarz
  textSecondary: '#626468' # Dunkelgrau
  textMuted: '#8a8c90'
  border: '#c0c1c3' # Mittelgrau
  borderLight: '#e6e6e7' # Hellgrau

dark:
  colors:
    background: '#232323' # Schwarz
    surface: '#2c2c2c'
    card: '#333333'
    text: '#f5f5f5' # Lichtgrau
    textSecondary: '#c0c1c3' # Mittelgrau
    textMuted: '#8a8c90'
    accent: '#15a04c' # lifted LMU Grün for contrast on dark
    accentHover: '#00883a'
    border: '#45474b'
    borderLight: '#333333'

fonts:
  body: "'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
  files:
    - family: 'Roboto'
      src: theme/fonts/Roboto.woff2
      weight: '100 900' # variable weight axis

# Official flat-green LMU mark: its solid green field keeps the wordmark
# legible on both the light-grey light theme and the dark theme.
logo: theme/lmu-logo.png
