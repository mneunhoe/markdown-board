name: Deploy web demo

on:
  push:
    branches: [main]
    paths:
      - 'packages/web/**'
      - 'packages/ui/**'
      - 'packages/core/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/web.yml'
  workflow_dispatch:

concurrency:
  group: web-deploy
  cancel-in-progress: true

# Requires three repository secrets to actually deploy:
#   VERCEL_TOKEN       — personal token from vercel.com/account/tokens
#   VERCEL_ORG_ID      — `vercel link` writes this to .vercel/project.json
#   VERCEL_PROJECT_ID  — same source
# Without them the workflow no-ops with a "secret missing" message so
# the repo can be forked without breaking CI.

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    if: github.repository_owner == 'mneunhoe'
    steps:
      - uses: actions/checkout@v4

      - name: Skip if secrets are missing
        id: gate
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN not configured — skipping deploy."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.skip != 'true'
        uses: pnpm/action-setup@v4

      - if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - if: steps.gate.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile

      - if: steps.gate.outputs.skip != 'true'
        run: pnpm --filter @markdown-board/web build

      - if: steps.gate.outputs.skip != 'true'
        name: Install Vercel CLI
        run: pnpm dlx vercel@latest --version

      - if: steps.gate.outputs.skip != 'true'
        name: Deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: packages/web
        run: |
          pnpm dlx vercel@latest pull --yes --environment=production --token "$VERCEL_TOKEN"
          pnpm dlx vercel@latest deploy --prebuilt=false --prod --yes --token "$VERCEL_TOKEN"
