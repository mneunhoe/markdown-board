name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'packages/web/**'
      - 'packages/shell/**'
      - 'packages/ui/**'
      - 'packages/core/**'
      - 'plugins/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-flight run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    if: github.repository_owner == 'mneunhoe'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build web app
        # Build the web app and its workspace deps (turbo resolves the graph).
        # Project pages serve under /<repo>/, so assets must be prefixed.
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
        run: pnpm exec turbo run build --filter=@markdown-board/web

      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/web/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
