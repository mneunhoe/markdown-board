name: Release

on:
  push:
    tags:
      - 'v*'

# Don't cancel an in-flight release build — each platform job uploads to the
# same draft Release and a half-finished cancel would leave it incomplete.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# tauri-action creates/updates a GitHub Release, which needs write access.
permissions:
  contents: write

jobs:
  release:
    name: Build & release (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Universal binary covers Apple Silicon + Intel from one job.
          - platform: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target universal-apple-darwin
          - platform: ubuntu-22.04
            rust-targets: ''
            args: ''
          - platform: windows-latest
            rust-targets: ''
            args: ''
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # webkit2gtk (4.1 = the GTK4/Tauri-2 line) + AppImage/.deb tooling.
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri

      - run: pnpm install --frozen-lockfile

      - name: Build the desktop app and attach to the Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing (lands in the auto-update slice). When the updater
          # is configured and these are set, tauri-action emits signed update
          # artifacts + latest.json; empty otherwise (no updater bundle).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code-signing + notarization (gated — see the codesign slice).
          # Empty until an Apple Developer ID is available; the build still
          # succeeds, producing an unsigned (Gatekeeper-warned) .app/.dmg.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: packages/desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'markdown-board ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
